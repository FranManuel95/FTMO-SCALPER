name: EURJPY Asian Session ORB 1H + Trail
symbol: EURJPY
strategy: asian_session_orb
timeframe: 1h
hypothesis: >
  Construir rango sesion asiatica (23:00-07:00 UTC) en EURJPY. Breakout entry
  07:00-12:00 UTC en direccion H4 trend, ADX>18, trail 0.3xATR. Logica: durante
  la sesion asiatica el JPY domina y establece el rango. Al abrir Londres, los
  flujos EUR rompen ese rango con impulso institucional. Misma mecanica que el
  validado USDJPY Asian ORB (PF 24.893) pero con el par EUR/JPY. La entrada POSTERIOR
  a la sesion asiatica evita la exposicion a sorpresas BoJ nocturnas — el evento
  ya ocurrio cuando se entra en posicion.
