hypothesis: 'EURGBP es el par mas range-bound del forex: EUR y GBP son dos monedas
  europeas altamente correladas que tienden a oscilar en rangos estrechos. Con ADX<22
  (filtro tendencia), el precio rebota en las BB exteriores con alta probabilidad.
  El evento Liz Truss (Sep 2022) sera filtrado por ADX alto. Hipotesis: MR funciona
  mejor en EURGBP que en EURUSD porque el par no tiene drivers macro unidireccionales
  de largo plazo.'
